<div class="theme-switch-wrap" th:fragment="themeSwitch">
    <span class="theme-switch-caption">Tema</span>
    <button type="button"
            class="theme-switch"
            data-theme-toggle
            role="switch"
            aria-checked="false"
            aria-label="Tema claro ativo. Clique para ativar o tema escuro">
        <span class="theme-switch-track">
            <span class="theme-switch-side theme-switch-side--light" title="Tema claro">
                <span th:replace="~{fragments/icons :: sun}"></span>
            </span>
            <span class="theme-switch-side theme-switch-side--dark" title="Tema escuro">
                <span th:replace="~{fragments/icons :: moon}"></span>
            </span>
            <span class="theme-switch-thumb" aria-hidden="true"></span>
        </span>
    </button>
</div>
