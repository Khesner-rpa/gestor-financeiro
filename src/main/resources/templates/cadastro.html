<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/assets :: head('Cadastro - Gestor Financeiro')}"></head>
<body>
    <main class="auth-shell">
        <section class="auth-brand">
            <div>
                <span class="brand-button"><span class="brand-mark"></span></span>
                <p class="eyebrow brand-accent">Conta segura</p>
                <h1 class="hero-title brand-heading">Gestor Financeiro</h1>
            </div>

            <p class="hero-title brand-statement">Seu dinheiro com acesso isolado por usuario.</p>
            <p class="muted brand-muted">Senha criptografada, CSRF ativo e cookies protegidos.</p>
        </section>

        <section class="auth-card-wrap">
            <div class="auth-card">
                <a th:href="@{/login}" class="auth-link">Voltar para login</a>
                <div class="side-menu-header auth-card-head auth-card-head-spaced">
                    <h1 class="page-title auth-card-title">Criar conta</h1>
                    <p class="side-menu-subtitle">Use uma senha com pelo menos 6 caracteres.</p>
                </div>

                <form th:action="@{/cadastro}" th:object="${cadastroForm}" method="post" class="field-stack">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <label class="field">
                        <span>Nome</span>
                        <input th:field="*{nome}" type="text" autocomplete="name" required>
                        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="field-error"></span>
                    </label>

                    <label class="field">
                        <span>E-mail</span>
                        <input th:field="*{email}" type="email" autocomplete="email" required>
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
                    </label>

                    <label class="field">
                        <span>Senha</span>
                        <input th:field="*{senha}" type="password" autocomplete="new-password" required>
                        <span th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}" class="field-error"></span>
                    </label>

                    <button type="submit" class="primary-button">Criar conta</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
