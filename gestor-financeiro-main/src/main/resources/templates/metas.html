<section id="panel-planejamento" class="dashboard-panel" th:fragment="planejamento">
    <div class="insight-grid">
        <article class="insight-card card">
            <div class="goal-card-head">
                <div>
                    <p class="section-title" th:text="${meta.nome}">Reserva de seguranca</p>
                    <p class="section-subtitle">
                        Objetivo: R$ <span th:text="${#numbers.formatDecimal(meta.objetivo, 1, 'POINT', 2, 'COMMA')}">0,00</span> |
                        Acumulado: R$ <span th:text="${#numbers.formatDecimal(meta.acumulado, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                    </p>
                </div>
                <button type="button" class="secondary-button goal-toggle-button" data-goal-toggle>Alterar meta</button>
            </div>

            <div class="investment-pie-wrap">
                <div class="investment-pie"
                     th:style="'--meta-percent: ' + ${meta.percentual} + '%;'"
                     role="img"
                     th:attr="aria-label=${'Grafico de investimentos com ' + meta.percentual + '% concluido'}">
                    <span th:text="${meta.percentual} + '%'">0%</span>
                </div>
                <div class="investment-legend">
                    <div class="investment-legend-row">
                        <span class="legend-dot legend-dot--saved"></span>
                        <span>Investido</span>
                        <strong th:text="'R$ ' + ${#numbers.formatDecimal(meta.acumulado, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</strong>
                    </div>
                    <div class="investment-legend-row">
                        <span class="legend-dot legend-dot--missing"></span>
                        <span>Faltante</span>
                        <strong th:text="'R$ ' + ${#numbers.formatDecimal(meta.restante, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</strong>
                    </div>
                </div>
            </div>

            <progress class="progress-native" th:value="${meta.percentual}" max="100"></progress>
            <p class="section-subtitle">
                <strong th:text="${meta.percentual} + '%'">0%</strong>
                concluido. Falta R$
                <span th:text="${#numbers.formatDecimal(meta.restante, 1, 'POINT', 2, 'COMMA')}">0,00</span>.
            </p>

            <div th:if="${erroReserva}" style="color: #ef4444; font-size: 0.875rem; font-weight: 500; margin-top: 1rem;" th:text="${erroReserva}"></div>

            <form hx-post="/reserva/objetivo" hx-target="#dashboard-content" hx-swap="outerHTML" class="goal-form is-hidden" data-goal-form>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="field" style="flex: 1; margin: 0;">
                    <span class="field-hint">Novo valor da meta</span>
                    <input type="number"
                           name="objetivo"
                           min="0.01"
                           step="0.01"
                           required
                           placeholder="Ex: 2500"
                           th:value="${meta.objetivo}">
                </label>
                <button type="submit" class="primary-button">Salvar meta</button>
            </form>
            
            <div style="margin-top: 1.5rem; border-top: 1px solid var(--border-color, #e2e8f0); padding-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 1.5rem;">
                <form hx-post="/reserva/depositar" hx-target="#dashboard-content" hx-swap="outerHTML" style="display: flex; gap: 0.5rem; flex: 1; min-width: 240px;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label class="field" style="flex: 1; margin: 0;">
                        <input type="number" name="valor" min="0.01" step="0.01" required placeholder="Guardar valor">
                    </label>
                    <button type="submit" class="primary-button" style="margin: 0; white-space: nowrap;">Guardar</button>
                </form>
                
                <form hx-post="/reserva/resgatar" hx-target="#dashboard-content" hx-swap="outerHTML" style="display: flex; gap: 0.5rem; flex: 1; min-width: 240px;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label class="field" style="flex: 1; margin: 0;">
                        <input type="number" name="valor" min="0.01" step="0.01" required placeholder="Resgatar valor">
                    </label>
                    <button type="submit" class="primary-button" style="margin: 0; white-space: nowrap; opacity: 0.85;">Resgatar</button>
                </form>
            </div>
        </article>

        <article class="insight-card card">
            <p class="section-title">Gastos por categoria</p>
            <div th:if="${!#lists.isEmpty(categoriasResumo)}" style="display: flex; flex-direction: column; gap: 10px; margin-top: 1rem;">
                <div id="categoria-display" class="category-row" style="display: flex; flex-wrap: wrap; align-items: center; padding-bottom: 0.5rem;">
                    <strong class="cat-nome" style="flex: 1;" th:text="${categoriasResumo[0].nome}">Nome</strong>
                    <span class="cat-valor" style="font-weight: 600;" th:text="'R$ ' + ${#numbers.formatDecimal(categoriasResumo[0].valor, 1, 'POINT', 2, 'COMMA')} + ' (' + ${categoriasResumo[0].percentual} + '%)'">R$ 0,00 (0%)</span>
                    <progress class="cat-barra progress-native" th:value="${categoriasResumo[0].percentual}" max="100" style="width: 100%; margin-top: 0.75rem;"></progress>
                </div>

                <label class="field" style="margin: 0;">
                    <span class="field-hint" style="font-size: 12px; margin-bottom: 2px; display: block;">Selecione para analisar:</span>
                    <select data-gasto-select style="cursor: pointer;">
                        <option th:each="categoria, stat : ${categoriasResumo}" 
                                th:value="${categoria.nome}" 
                                th:data-valor="${#numbers.formatDecimal(categoria.valor, 1, 'POINT', 2, 'COMMA')}"
                                th:data-percentual="${categoria.percentual}"
                                th:selected="${stat.first}"
                                th:text="${categoria.nome}"></option>
                    </select>
                </label>
            </div>
            <p class="section-subtitle" th:if="${#lists.isEmpty(categoriasResumo)}">Cadastre despesas para visualizar o mapa de gastos.</p>
        </article>
    </div>
</section>
