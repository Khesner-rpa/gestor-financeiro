# ==========================================
# IDENTIFICAÇÃO DA APLICAÇÃO
# ==========================================
spring.application.name=gestor-financeiro

# ==========================================
# CONFIGURAÇÃO DO BANCO DE DADOS (NEON CLOUD)
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-flat-fog-aqei7dwa-pooler.c-8.us-east-1.aws.neon.tech/gestor-financeiro?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_a6jQs5vmWCio}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# PERSISTÊNCIA E MIGRAÇÃO (JPA/HIBERNATE & FLYWAY)
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.baseline-on-migrate=true

# ==========================================
# SEGURANÇA DE SESSÃO (WEB/HTTP)
# ==========================================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=30m

# ==========================================
# SEGURANÇA DE ERROS (PRIVACIDADE)
# ==========================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ==========================================
# MONITORAMENTO E PORTA
# ==========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
server.port=${PORT:8080}