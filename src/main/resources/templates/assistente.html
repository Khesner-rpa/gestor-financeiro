<section id="panel-assistente" class="dashboard-panel" th:fragment="assistente">
    <div class="gemini-shell">
        <article id="finance-bot"
                 class="gemini-chat"
                 th:data-saldo="${#numbers.formatDecimal(resumo.saldoAtual, 1, 'POINT', 2, 'COMMA')}"
                 th:data-receitas="${#numbers.formatDecimal(resumo.receitasMes, 1, 'POINT', 2, 'COMMA')}"
                 th:data-despesas="${#numbers.formatDecimal(resumo.despesasMes, 1, 'POINT', 2, 'COMMA')}"
                 th:data-categoria="${principalCategoria}"
                 th:data-economia="${#numbers.formatDecimal(meta.restante, 1, 'POINT', 2, 'COMMA')}"
                 th:data-insight="${insight.mensagem}">
            <div id="bot-feed" class="gemini-feed">
                <div class="bot-welcome">
                    <p class="bot-welcome-title">Assistente financeiro</p>
                    <p class="bot-welcome-text">Analise seu mes com base nos seus dados locais. Nada e enviado para fora do app.</p>
                    <div class="gemini-chips">
                        <button type="button" class="chip-button" data-bot-action="resumo">Resumir meu mes</button>
                        <button type="button" class="chip-button" data-bot-action="otimizar">Como reduzir gastos?</button>
                        <button type="button" class="chip-button" data-bot-action="meta">Como esta minha meta?</button>
                        <button type="button" class="chip-button" data-bot-action="categoria">Onde gasto mais?</button>
                    </div>
                </div>
            </div>

            <div class="gemini-input-bar">
                <input type="text"
                       id="bot-input"
                       data-bot-input
                       class="gemini-input"
                       placeholder="Pergunte sobre saldo, gastos ou metas..."
                       autocomplete="off"
                       maxlength="220">
                <button type="button" id="bot-send" data-bot-send class="gemini-send" aria-label="Enviar pergunta">
                    <span th:replace="~{fragments/icons :: send}"></span>
                </button>
            </div>
        </article>
    </div>
</section>
