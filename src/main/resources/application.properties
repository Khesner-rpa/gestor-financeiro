# ==========================================
# IDENTIFICAÇÃO DA APLICAÇÃO
# ==========================================
spring.application.name=gestor-financeiro

# ==========================================
# BANCO DE DADOS
# Configurado em tempo de execução pelo
# GestorFinanceiroApplication (main).
# Não defina datasource aqui para não
# conflitar com a escolha interativa.
# ==========================================

# ==========================================
# PERSISTÊNCIA (JPA)
# ==========================================
spring.jpa.open-in-view=false

# ==========================================
# SEGURANÇA DE SESSÃO (WEB/HTTP)
# ==========================================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=30m

# ==========================================
# SEGURANÇA DE ERROS (PRIVACIDADE)
# ==========================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ==========================================
# MONITORAMENTO E PORTA
# ==========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
server.port=${PORT:8080}